<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="400" viewBox="0 0 1600 400" role="img" aria-label="Ankit Biswas  Full-Stack Developer">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A2A66"/>
      <stop offset="55%" stop-color="#0D3478"/>
      <stop offset="100%" stop-color="#0A2A66"/>
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1EA7FF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#1EA7FF" stop-opacity="0.2"/>
    </linearGradient>
    <radialGradient id="glowGradient" cx="78%" cy="42%" r="38%">
      <stop offset="0%" stop-color="#1EA7FF" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#1EA7FF" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <clipPath id="avatarClip">
      <circle cx="1280" cy="200" r="92"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1600" height="400" fill="url(#bgGradient)"/>
  <rect width="1600" height="400" fill="url(#glowGradient)"/>

  <!-- Geometric accents -->
  <circle cx="1380" cy="70" r="120" fill="#1EA7FF" opacity="0.08"/>
  <circle cx="1480" cy="330" r="90" fill="#FFFFFF" opacity="0.04"/>
  <rect x="1180" y="40" width="180" height="180" rx="36" fill="#1EA7FF" opacity="0.06" transform="rotate(18 1270 130)"/>
  <rect x="1040" y="250" width="140" height="140" rx="28" fill="#FFFFFF" opacity="0.05" transform="rotate(-12 1110 320)"/>

  <!-- Subtle geometric accents (no grid) -->
  <circle cx="1380" cy="70" r="120" fill="#1EA7FF" opacity="0.08"/>
  <circle cx="1480" cy="330" r="90" fill="#FFFFFF" opacity="0.04"/>
  <rect x="1180" y="40" width="180" height="180" rx="36" fill="#1EA7FF" opacity="0.06" transform="rotate(18 1270 130)"/>
  <rect x="1040" y="250" width="140" height="140" rx="28" fill="#FFFFFF" opacity="0.05" transform="rotate(-12 1110 320)"/>

  <!-- Accent bar -->
  <rect x="120" y="318" width="220" height="4" rx="2" fill="url(#accentGradient)"/>

  <!-- Left content -->
  <text x="120" y="118" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="54" font-weight="700" letter-spacing="-0.5">
    Ankit Biswas
  </text>
  <text x="120" y="168" fill="#1EA7FF" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="600">
    Full-Stack Developer
  </text>
  <text x="120" y="222" fill="#E8EEF7" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="400">
    Building Scalable Enterprise Applications
  </text>
  <text x="120" y="268" fill="#B8C7DC" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="400" letter-spacing="0.3">
    ASP.NET Core • React • SQL Server • Azure DevOps
  </text>

  <!-- Profile frame -->
  <g filter="url(#softShadow)">
    <circle cx="1280" cy="200" r="100" fill="none" stroke="#1EA7FF" stroke-width="3" opacity="0.85"/>
    <image href="profile.png" x="1188" y="108" width="184" height="184" clip-path="url(#avatarClip)" preserveAspectRatio="xMidYMid slice"/>
  </g>

  <!-- Decorative connector -->
  <path d="M 980 200 C 1080 200, 1120 200, 1180 200" stroke="#1EA7FF" stroke-width="2" fill="none" opacity="0.35" stroke-dasharray="6 10"/>
</svg>
